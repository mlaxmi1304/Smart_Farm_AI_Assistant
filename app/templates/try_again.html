{% extends 'layout.html' %}
{% block body %}

<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
  <div class="card p-4 shadow-lg text-center" style="max-width: 600px; background-color: #fff8e1;">
    <h2 class="mb-4 text-dark"><strong>Oops! Something went wrong.</strong></h2>
    <p class="text-muted">We couldn’t process your request at the moment. Please check your inputs or try again shortly.</p>
    <a href="{{ url_for('home') }}" class="mt-3">
      <button class="btn btn-warning font-weight-bold px-4 py-2">Try Again</button>
    </a>
  </div>
</div>

{% endblock %}
